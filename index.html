<!doctype html>
<html lang="id">
<head>
 <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Gabut</title>

  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Background Video -->
  <video id="bg-video" autoplay muted loop style="display: none;">
    <source src="Videos/kntl.webm" type="video/webm">
    <source src="Videos/kntl.mp4" type="video/mp4">
  </video>

  <!-- Background Music -->
  <audio id="bg-music" loop style="display: none;">
    <source src="Music/DJ MALU MALU BOY.mp3" type="audio/mpeg">
  </audio>

  <!-- Background image will be set via CSS -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  <button id="play-button" style="position: fixed; bottom: 20px; right: 20px; z-index: 10; display: none; padding: 15px 30px; background: linear-gradient(45deg, #007bff, #89f7fe); color: white; border: none; border-radius: 25px; font-size: 16px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);">Play Video</button>

  <div class="container">
    <div class="judul-situs">
      <h1>Project Gabut</h1>
      <nav>
        <ul>
          <li><a href="home.html">Home</a></li>
          <li><a href="games.html">Games</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>

    <div class="main-content">
      <!-- Joke Generator -->
      <div class="joke-container">
        <div class="joke-header">
          <h3>Joke Generator</h3>
        </div>
        <div class="joke-content">
          <p id="joke-text">Loading joke...</p>
          <button id="get-joke-btn">Get New Joke</button>
        </div>
      </div>

      <!-- Confess Menu -->
      <div class="confess-container">
        <div class="confess-header">
          <h3>Confess Menu</h3>
        </div>
        <div class="confess-input-container">
          <textarea id="confess-input" placeholder="Tulis curhatanmu di sini... (anonim)" rows="3"></textarea>
          <button id="submit-confess-btn">Kirim Curhat</button>
        </div>
        <div class="confess-list" id="confess-list">
          <!-- Confessions will be added here -->
        </div>
      </div>
    </div>



    <!-- Music Player - Fixed at Bottom -->
    <div class="music-player">
      <div class="music-header">
        <h3>🎵 Music Player</h3>
      </div>



      <div class="music-controls">
        <button id="prev-btn" class="control-btn">Prev</button>
        <button id="play-pause-btn" class="control-btn">Play</button>
        <button id="next-btn" class="control-btn">Next</button>
      </div>
      <div class="music-info">
        <div id="track-title">Hey Daddy (Daddy's Home)</div>
        <div id="track-artist">Usher</div>
      </div>
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
        <input type="range" id="progress-slider" min="0" max="100" value="0" class="progress-slider">
      </div>
      <div class="volume-container">
        <span>Volume</span>
        <input type="range" id="volume-slider" min="0" max="100" value="50" class="volume-slider">
      </div>
      <div class="playlist">
        <h4>Playlist</h4>
        <ul id="playlist">
          <li data-src="Music/Hey Daddy ( Daddy's Home ) - Usher ( Speed up Reverb Underwater ) Tiktok Version.mp3" data-title="Hey Daddy (Daddy's Home)" data-artist="Usher">Hey Daddy (Daddy's Home)</li>
          <li data-src="Music/iyaz - replay (sped up).mp3" data-title="replay (sped up)" data-artist="iyaz">replay (sped up)</li>
          <li data-src="Music/one of the girls (sped up).mp3" data-title="one of the girls (sped up)" data-artist="Various Artists">one of the girls (sped up)</li>
        </ul>
      </div>

      <audio id="audio-player" preload="metadata"></audio>
    </div>

  </div>



  <script>
    let clickCount = 0;
    const bgVideo = document.getElementById('bg-video');
    const playButton = document.getElementById('play-button');
    const bgMusic = document.getElementById('bg-music');
    let bgMusicWasPlaying = false;

    // Background Music Persistence
    const currentTime = sessionStorage.getItem('bgMusicTime');
    const bgMusicPlaying = sessionStorage.getItem('bgMusicPlaying') === 'true';
    const musicPlayerActive = sessionStorage.getItem('musicPlayerActive') === 'true';

    if (currentTime) {
      bgMusic.currentTime = parseFloat(currentTime);
    } else {
      bgMusic.currentTime = 40; // Start from 40 seconds as per user request
    }

    if (bgMusicPlaying && !musicPlayerActive) {
      bgMusic.play().catch(() => {});
    }

    // Save music state when page unloads
    window.addEventListener('beforeunload', () => {
      sessionStorage.setItem('bgMusicTime', bgMusic.currentTime);
      sessionStorage.setItem('bgMusicPlaying', !bgMusic.paused);
    });

    // Audio already starts from 40 seconds (pre-cut)

    // Function to check if video is playing
    function checkVideoPlayback() {
      if (bgVideo.paused || bgVideo.readyState < 4) {
        playButton.style.display = 'block';
      } else {
        playButton.style.display = 'none';
      }
    }

    // Check on load and after a short delay to account for autoplay policies
    window.addEventListener('load', () => {
      setTimeout(checkVideoPlayback, 1000);
    });

    // Play video on button click
    playButton.addEventListener('click', () => {
      bgVideo.play().then(() => {
        playButton.style.display = 'none';
      }).catch(error => {
        console.error('Error playing video:', error);
      });
    });

    // Auto-play background music
    bgMusic.play().then(() => {
      sessionStorage.setItem('bgMusicPlaying', 'true');
    }).catch(error => {
      console.error('Error auto-playing music:', error);
    });

    // Click counter for secret access
    document.addEventListener('click', (event) => {
      // Exclude clicks on buttons, inputs, links, and other interactive elements
      if (event.target.tagName !== 'BUTTON' && event.target.tagName !== 'INPUT' && event.target.tagName !== 'A' && event.target.tagName !== 'TEXTAREA' && !event.target.closest('button') && !event.target.closest('input') && !event.target.closest('a') && !event.target.closest('textarea')) {
        console.log('Background clicked, clickCount:', clickCount);
        clickCount++;
        if (clickCount >= 5) {
          console.log('Redirecting to secret page');
          window.location.href = 'secret.html';
        } else {
          // Optional: Show feedback
          console.log(`Klik lagi ${5 - clickCount} kali untuk akses rahasia`);
        }
      }
    });





    // Music Player JavaScript
    const audioPlayer = document.getElementById('audio-player');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressBar = document.querySelector('.progress-bar');
    const progressSlider = document.getElementById('progress-slider');
    const volumeSlider = document.getElementById('volume-slider');
    const trackTitle = document.getElementById('track-title');
    const trackArtist = document.getElementById('track-artist');
    const playlist = document.getElementById('playlist');
    const playlistItems = playlist.querySelectorAll('li');

    let currentTrackIndex = 0;
    let isPlaying = false;

    // Load track
    function loadTrack(index) {
      const track = playlistItems[index];
      const src = track.getAttribute('data-src');
      const title = track.getAttribute('data-title');
      const artist = track.getAttribute('data-artist');

      audioPlayer.src = src;
      trackTitle.textContent = title;
      trackArtist.textContent = artist;

      // Update active class
      playlistItems.forEach(item => item.classList.remove('active'));
      track.classList.add('active');

      currentTrackIndex = index;
    }

    // Play/Pause
    function togglePlayPause() {
      if (isPlaying) {
        audioPlayer.pause();
        playPauseBtn.textContent = '▶';
        sessionStorage.setItem('musicPlayerActive', 'false');
        // Resume background music if it was playing
        const bgMusicPlaying = sessionStorage.getItem('bgMusicPlaying') === 'true';
        if (bgMusicPlaying) {
          bgMusic.play().catch(() => {});
        }
      } else {
        audioPlayer.play();
        playPauseBtn.textContent = '⏸';
        sessionStorage.setItem('musicPlayerActive', 'true');
        // Pause background music
        bgMusic.pause();
      }
      isPlaying = !isPlaying;
    }

    // Next track
    function nextTrack() {
      currentTrackIndex = (currentTrackIndex + 1) % playlistItems.length;
      loadTrack(currentTrackIndex);
      if (isPlaying) {
        audioPlayer.play();
      }
    }

    // Previous track
    function prevTrack() {
      currentTrackIndex = (currentTrackIndex - 1 + playlistItems.length) % playlistItems.length;
      loadTrack(currentTrackIndex);
      if (isPlaying) {
        audioPlayer.play();
      }
    }

    // Update progress bar
    function updateProgress() {
      const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
      progressBar.style.setProperty('--progress', `${progress}%`);
      progressSlider.value = progress;
    }

    // Seek
    function seek(event) {
      const seekTime = (event.target.value / 100) * audioPlayer.duration;
      audioPlayer.currentTime = seekTime;
    }

    // Volume control
    function setVolume() {
      audioPlayer.volume = volumeSlider.value / 100;
    }

    // Auto-play next track
    audioPlayer.addEventListener('ended', nextTrack);

    // Event listeners
    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);
    audioPlayer.addEventListener('timeupdate', updateProgress);
    progressSlider.addEventListener('input', seek);
    volumeSlider.addEventListener('input', setVolume);

    // Playlist click
    playlistItems.forEach((item, index) => {
      item.addEventListener('click', () => {
        loadTrack(index);
        if (!isPlaying) {
          togglePlayPause();
        } else {
          audioPlayer.play();
        }
      });
    });

    // Load first track on page load
    loadTrack(0);

    // Confess Menu JavaScript
    const confessInput = document.getElementById('confess-input');
    const submitConfessBtn = document.getElementById('submit-confess-btn');
    const confessList = document.getElementById('confess-list');

    // Load confessions from localStorage
    function loadConfessions() {
      const confessions = JSON.parse(localStorage.getItem('confessions')) || [];
      confessList.innerHTML = '';
      confessions.slice(-10).forEach(confession => {
        displayConfession(confession.text, confession.timestamp);
      });
    }

    // Display a confession
    function displayConfession(text, timestamp) {
      const confessionDiv = document.createElement('div');
      confessionDiv.className = 'confession-item';
      confessionDiv.innerHTML = `
        <div>${text}</div>
        <div class="timestamp">${new Date(timestamp).toLocaleString()}</div>
      `;
      confessList.appendChild(confessionDiv);
      confessList.scrollTop = confessList.scrollHeight;
    }

    // Submit confession
    function submitConfession() {
      const text = confessInput.value.trim();
      if (text === '') return;

      const confession = {
        text: text,
        timestamp: Date.now()
      };

      // Save to localStorage
      const confessions = JSON.parse(localStorage.getItem('confessions')) || [];
      confessions.push(confession);
      localStorage.setItem('confessions', JSON.stringify(confessions));

      // Display and clear input
      displayConfession(text, confession.timestamp);
      confessInput.value = '';
    }

    // Event listeners
    submitConfessBtn.addEventListener('click', submitConfession);
    confessInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        submitConfession();
      }
    });

    // Load confessions on page load
    loadConfessions();

    // Joke Generator JavaScript
    const jokeText = document.getElementById('joke-text');
    const getJokeBtn = document.getElementById('get-joke-btn');

    // Function to fetch a random joke
    async function fetchJoke() {
      try {
        const response = await fetch('https://official-joke-api.appspot.com/random_joke');
        const joke = await response.json();
        jokeText.textContent = `${joke.setup} - ${joke.punchline}`;
      } catch (error) {
        console.error('Error fetching joke:', error);
        jokeText.textContent = 'Oops! Could not fetch a joke. Try again later.';
      }
    }

    // Event listener for the button
    getJokeBtn.addEventListener('click', fetchJoke);

    // Fetch a joke on page load
    fetchJoke();


  </script>
</body>
</html>
